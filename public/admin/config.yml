backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

locale: "vi"

collections:
  - name: "poems"
    label: "Thơ"
    folder: "src/content/poems"
    create: true
    slug: "{{slug}}"
    format: "frontmatter"
    fields:
      - label: "Tiêu đề"
        name: "title"
        widget: "string"

      - label: "Ngày đăng"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"

      - label: "Mô tả ngắn"
        name: "excerpt"
        widget: "text"
        required: false

      - label: "Tập thơ"
        name: "collection"
        widget: "select"
        required: false
        options:
          - "Va Vào Lần Yêu Cuối"
          - "Thơ rời"

      - label: "Chương"
        name: "chapter"
        widget: "string"
        required: false

      - label: "Thứ tự trong tập"
        name: "order"
        widget: "number"
        required: false

      - label: "Mood / Giọng thơ"
        name: "mood"
        widget: "string"
        required: false

      - label: "Hiển thị trong sách lật"
        name: "showInBook"
        widget: "boolean"
        default: false

      - label: "Xuất bản"
        name: "published"
        widget: "boolean"
        default: true

      - label: "Nội dung bài thơ"
        name: "body"
        widget: "markdown"
